<!-- Topbar -->
<nav class="navbar navbar-expand navbar-light bg-white topbar mb-4 static-top shadow">

    <!-- Sidebar Toggle (mobile) -->
    <button id="sidebarToggleTop" class="btn btn-link d-md-none rounded-circle mr-3">
        <i class="fa fa-bars"></i>
    </button>

    <!-- Date & Live Clock -->
    <div class="d-none d-sm-flex align-items-center">
        <i class="fas fa-calendar-day fa-fw text-gray-400 mr-2"></i>
        <span class="text-gray-600 small mr-3" id="topbar-date"></span>
        <i class="fas fa-clock fa-fw text-gray-400 mr-2"></i>
        <span class="text-gray-600 small font-weight-bold" id="topbar-clock"></span>
    </div>

    <!-- Right-side nav -->
    <ul class="navbar-nav ml-auto">

        <div class="topbar-divider d-none d-sm-block"></div>

        <!-- User Dropdown -->
        <li class="nav-item dropdown no-arrow">
            <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button"
                data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                <span class="mr-2 d-none d-lg-inline text-gray-600 small">
                    {% if user.get_full_name %}{{ user.get_full_name }}{% else %}{{ user.username }}{% endif %}
                </span>
                <i class="fas fa-user-circle fa-fw fa-lg text-gray-400"></i>
            </a>

            <div class="dropdown-menu dropdown-menu-right shadow animated--grow-in" aria-labelledby="userDropdown">
                <a class="dropdown-item" href="#">
                    <i class="fas fa-user fa-sm fa-fw mr-2 text-gray-400"></i>
                    Profile
                </a>
                <a class="dropdown-item" href="#">
                    <i class="fas fa-cogs fa-sm fa-fw mr-2 text-gray-400"></i>
                    Settings
                </a>
                <div class="dropdown-divider"></div>
                <a class="dropdown-item" href="#" data-toggle="modal" data-target="#logoutModal">
                    <i class="fas fa-sign-out-alt fa-sm fa-fw mr-2 text-gray-400"></i>
                    Logout
                </a>
            </div>
        </li>

    </ul>
</nav>
<!-- End Topbar -->

<script>
(function () {
    const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const MONTHS = ['January','February','March','April','May','June',
                    'July','August','September','October','November','December'];

    function pad(n) { return String(n).padStart(2, '0'); }

    function tick() {
        const now  = new Date();
        const day  = DAYS[now.getDay()];
        const date = now.getDate();
        const mon  = MONTHS[now.getMonth()];
        const yr   = now.getFullYear();

        const h    = now.getHours();
        const m    = pad(now.getMinutes());
        const s    = pad(now.getSeconds());
        const ampm = h >= 12 ? 'PM' : 'AM';
        const h12  = h % 12 || 12;

        const dateEl  = document.getElementById('topbar-date');
        const clockEl = document.getElementById('topbar-clock');
        if (dateEl)  dateEl.textContent  = `${day}, ${mon} ${date}, ${yr}`;
        if (clockEl) clockEl.textContent = `${h12}:${m}:${s} ${ampm}`;
    }

    tick();
    setInterval(tick, 1000);
})();
</script>
