{% load static %}
<!-- Sidebar -->
<ul class="navbar-nav bg-gradient-primary sidebar sidebar-dark accordion" id="accordionSidebar">

    <!-- Brand -->
    <a class="sidebar-brand d-flex align-items-center justify-content-center" href="{% url 'core:home' %}">
        <div class="sidebar-brand-icon">
            <i class="fas fa-money-check-alt"></i>
        </div>
        <div class="sidebar-brand-text mx-3">PayrollPro</div>
    </a>

    <hr class="sidebar-divider my-0">

    <!-- Dashboard -->
    <li class="nav-item {% if request.resolver_match.app_name == 'core' and request.resolver_match.url_name == 'home' %}active{% endif %}">
        <a class="nav-link" href="{% url 'core:home' %}">
            <i class="fas fa-fw fa-tachometer-alt"></i>
            <span>Dashboard</span>
        </a>
    </li>

    <!-- Employees -->
    <li class="nav-item {% if request.resolver_match.app_name == 'employees' %}active{% endif %}">
        <a class="nav-link collapsed" href="#" data-toggle="collapse" data-target="#collapseEmployees"
            aria-expanded="false" aria-controls="collapseEmployees">
            <i class="fas fa-fw fa-users"></i>
            <span>Employees</span>
        </a>
        <div id="collapseEmployees" class="collapse {% if request.resolver_match.app_name == 'employees' %}show{% endif %}"
            data-parent="#accordionSidebar">
            <div class="bg-white py-2 collapse-inner rounded">
                <a class="collapse-item {% if request.resolver_match.url_name == 'list' %}active{% endif %}"
                   href="{% url 'employees:list' %}">Employee List</a>
                <a class="collapse-item {% if request.resolver_match.url_name == 'create' %}active{% endif %}"
                   href="{% url 'employees:create' %}">Add Employee</a>
                <a class="collapse-item {% if request.resolver_match.url_name == 'groups' %}active{% endif %}"
                   href="{% url 'employees:groups' %}">Groups</a>
            </div>
        </div>
    </li>

    <!-- Scheduling -->
    <li class="nav-item {% if request.resolver_match.app_name == 'scheduling' %}active{% endif %}">
        <a class="nav-link collapsed" href="#" data-toggle="collapse" data-target="#collapseScheduling"
            aria-expanded="false" aria-controls="collapseScheduling">
            <i class="fas fa-fw fa-calendar-alt"></i>
            <span>Scheduling</span>
        </a>
        <div id="collapseScheduling" class="collapse {% if request.resolver_match.app_name == 'scheduling' %}show{% endif %}"
            data-parent="#accordionSidebar">
            <div class="bg-white py-2 collapse-inner rounded">
                <a class="collapse-item {% if request.resolver_match.url_name == 'cycle_list' %}active{% endif %}"
                   href="{% url 'scheduling:cycle_list' %}">All Cycles</a>
                <a class="collapse-item {% if request.resolver_match.url_name == 'cycle_create' %}active{% endif %}"
                   href="{% url 'scheduling:cycle_create' %}">New Cycle</a>
            </div>
        </div>
    </li>

    <!-- Time Recording -->
    <li class="nav-item {% if request.resolver_match.app_name == 'attendance' %}active{% endif %}">
        <a class="nav-link" href="{% url 'attendance:time_recording' %}">
            <i class="fas fa-fw fa-clock"></i>
            <span>Time Recording</span>
        </a>
    </li>

    <!-- Payroll -->
    <li class="nav-item {% if request.resolver_match.app_name == 'payroll' %}active{% endif %}">
        <a class="nav-link collapsed" href="#" data-toggle="collapse" data-target="#collapsePayroll"
            aria-expanded="false" aria-controls="collapsePayroll">
            <i class="fas fa-fw fa-file-invoice-dollar"></i>
            <span>Payroll</span>
        </a>
        <div id="collapsePayroll" class="collapse {% if request.resolver_match.app_name == 'payroll' %}show{% endif %}"
            data-parent="#accordionSidebar">
            <div class="bg-white py-2 collapse-inner rounded">
                <a class="collapse-item" href="#">Close Payroll</a>
                <a class="collapse-item" href="#">Payslips</a>
                <a class="collapse-item" href="#">Paysheet</a>
                <a class="collapse-item" href="#">Attendance Report</a>
            </div>
        </div>
    </li>

    <!-- Settings -->
    <li class="nav-item {% if request.resolver_match.app_name == 'core' and request.resolver_match.url_name == 'settings' %}active{% endif %}">
        <a class="nav-link" href="{% url 'core:settings' %}">
            <i class="fas fa-fw fa-cogs"></i>
            <span>Settings</span>
        </a>
    </li>

    <hr class="sidebar-divider d-none d-md-block">

    <!-- Sidebar Toggler -->
    <div class="text-center d-none d-md-inline">
        <button class="rounded-circle border-0" id="sidebarToggle"></button>
    </div>

</ul>
<!-- End Sidebar -->
